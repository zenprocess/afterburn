<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 60" width="480" height="60">
  <defs>
    <linearGradient id="footerbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="footeraccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667788;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#8899aa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#667788;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <rect width="480" height="60" rx="8" fill="url(#footerbg)" />
  <rect x="0" y="0" width="480" height="1" fill="url(#footeraccent)" rx="0.5" />

  <!-- Dot separator left -->
  <circle cx="24" cy="30" r="2" fill="#334455" />

  <!-- "Part of" -->
  <text x="44" y="27" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#556677" font-weight="400">Part of</text>

  <!-- standra.ai -->
  <text x="44" y="45" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" fill="#8899aa" font-weight="700" letter-spacing="0.5">standra.ai</text>

  <!-- Divider -->
  <line x1="168" y1="14" x2="168" y2="46" stroke="#223344" stroke-width="1" />

  <!-- Tagline -->
  <text x="184" y="35" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12" fill="#445566" font-weight="400">Open Standards for the AI-Ready Enterprise</text>

  <!-- Dot separator right -->
  <circle cx="456" cy="30" r="2" fill="#334455" />
</svg>
