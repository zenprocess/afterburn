<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flame1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ffa500;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="flame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ffa500;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500" />
      <stop offset="100%" style="stop-color:#ffa500" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4500;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffa500;stop-opacity:0.3" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" /><line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" /><line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" /><line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="0" y1="60" x2="1200" y2="60" /><line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="180" x2="1200" y2="180" /><line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="300" x2="1200" y2="300" /><line x1="0" y1="360" x2="1200" y2="360" />
    <line x1="0" y1="420" x2="1200" y2="420" /><line x1="0" y1="480" x2="1200" y2="480" />
    <line x1="0" y1="540" x2="1200" y2="540" />
  </g>

  <!-- Ambient glow behind the flame icon -->
  <ellipse cx="180" cy="280" rx="120" ry="140" fill="#ff4500" opacity="0.06" filter="url(#blur)" />

  <!-- Flame icon -->
  <g transform="translate(115, 170)">
    <!-- Outer flame -->
    <path d="M65 220 C65 220, 10 160, 20 100 C25 70, 40 50, 50 30 C55 20, 60 8, 65 0 C70 8, 75 20, 80 30 C90 50, 105 70, 110 100 C120 160, 65 220, 65 220 Z" fill="url(#flame1)" opacity="0.9"/>
    <!-- Inner flame -->
    <path d="M65 220 C65 220, 30 175, 38 130 C42 110, 50 90, 55 70 C58 58, 62 48, 65 40 C68 48, 72 58, 75 70 C80 90, 88 110, 92 130 C100 175, 65 220, 65 220 Z" fill="url(#flame2)" opacity="0.8"/>
    <!-- Core -->
    <path d="M65 220 C65 220, 48 195, 52 165 C54 150, 58 138, 62 125 C63 120, 64 115, 65 110 C66 115, 67 120, 68 125 C72 138, 76 150, 78 165 C82 195, 65 220, 65 220 Z" fill="#ffd700" opacity="0.6"/>
  </g>

  <!-- Title: AFTERBURN -->
  <text x="260" y="290" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="82" font-weight="800" fill="#ffffff" letter-spacing="6">AFTERBURN</text>

  <!-- Glow line under title -->
  <rect x="260" y="308" width="740" height="2" fill="url(#accent)" rx="1" />
  <rect x="260" y="308" width="740" height="2" fill="url(#glow)" filter="url(#softglow)" />

  <!-- Tagline -->
  <text x="260" y="355" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#8899aa" font-weight="400" letter-spacing="1">Extract residual intelligence from spent sessions</text>

  <!-- Feature pills -->
  <g transform="translate(260, 400)">
    <!-- Pill 1: Friction -->
    <rect x="0" y="0" width="145" height="36" rx="18" fill="none" stroke="#ff4500" stroke-width="1.5" opacity="0.6" />
    <text x="72" y="23" font-family="'SF Mono', monospace" font-size="13" fill="#ff6b35" text-anchor="middle" font-weight="500">FRICTION</text>

    <!-- Pill 2: Patterns -->
    <rect x="160" y="0" width="145" height="36" rx="18" fill="none" stroke="#ffa500" stroke-width="1.5" opacity="0.6" />
    <text x="232" y="23" font-family="'SF Mono', monospace" font-size="13" fill="#ffa500" text-anchor="middle" font-weight="500">PATTERNS</text>

    <!-- Pill 3: Taxonomy -->
    <rect x="320" y="0" width="155" height="36" rx="18" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.6" />
    <text x="397" y="23" font-family="'SF Mono', monospace" font-size="13" fill="#ffd700" text-anchor="middle" font-weight="500">TAXONOMY</text>

    <!-- Pill 4: Evolution -->
    <rect x="490" y="0" width="155" height="36" rx="18" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.6" />
    <text x="567" y="23" font-family="'SF Mono', monospace" font-size="13" fill="#ff6b35" text-anchor="middle" font-weight="500">EVOLUTION</text>

    <!-- Pill 5: Releases -->
    <rect x="660" y="0" width="145" height="36" rx="18" fill="none" stroke="#ff4500" stroke-width="1.5" opacity="0.6" />
    <text x="732" y="23" font-family="'SF Mono', monospace" font-size="13" fill="#ff4500" text-anchor="middle" font-weight="500">RELEASES</text>
  </g>

  <!-- Architecture mini-diagram -->
  <g transform="translate(260, 470)" opacity="0.5">
    <!-- Session files -->
    <rect x="0" y="0" width="100" height="28" rx="4" fill="none" stroke="#445566" stroke-width="1" />
    <text x="50" y="18" font-family="'SF Mono', monospace" font-size="10" fill="#667788" text-anchor="middle">sessions/</text>

    <!-- Arrow -->
    <line x1="110" y1="14" x2="145" y2="14" stroke="#445566" stroke-width="1" />
    <polygon points="145,10 155,14 145,18" fill="#445566" />

    <!-- RLM REPL -->
    <rect x="160" y="0" width="100" height="28" rx="4" fill="none" stroke="#ff4500" stroke-width="1" opacity="0.5" />
    <text x="210" y="18" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35" text-anchor="middle">RLM REPL</text>

    <!-- Arrow -->
    <line x1="270" y1="14" x2="305" y2="14" stroke="#445566" stroke-width="1" />
    <polygon points="305,10 315,14 305,18" fill="#445566" />

    <!-- Passes -->
    <rect x="320" y="0" width="100" height="28" rx="4" fill="none" stroke="#ffa500" stroke-width="1" opacity="0.5" />
    <text x="370" y="18" font-family="'SF Mono', monospace" font-size="10" fill="#ffa500" text-anchor="middle">4 passes</text>

    <!-- Arrow -->
    <line x1="430" y1="14" x2="465" y2="14" stroke="#445566" stroke-width="1" />
    <polygon points="465,10 475,14 465,18" fill="#445566" />

    <!-- Findings -->
    <rect x="480" y="0" width="110" height="28" rx="4" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5" />
    <text x="535" y="18" font-family="'SF Mono', monospace" font-size="10" fill="#ffd700" text-anchor="middle">.afterburn/</text>

    <!-- Arrow -->
    <line x1="600" y1="14" x2="635" y2="14" stroke="#445566" stroke-width="1" />
    <polygon points="635,10 645,14 635,18" fill="#445566" />

    <!-- CCAR -->
    <rect x="650" y="0" width="100" height="28" rx="4" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.5" />
    <text x="700" y="18" font-family="'SF Mono', monospace" font-size="10" fill="#ff6b35" text-anchor="middle">CCAR evolve</text>
  </g>

  <!-- Footer -->
  <text x="260" y="560" font-family="'Inter', sans-serif" font-size="14" fill="#445566">Claude Code session intelligence</text>
  <text x="260" y="582" font-family="'Inter', sans-serif" font-size="13" fill="#334455">github.com/zenprocess/afterburn</text>

  <!-- standra.ai badge -->
  <g transform="translate(920, 548)">
    <rect x="0" y="0" width="220" height="40" rx="6" fill="none" stroke="#334455" stroke-width="1" />
    <text x="110" y="17" font-family="'Inter', sans-serif" font-size="11" fill="#556677" text-anchor="middle">Part of</text>
    <text x="110" y="33" font-family="'Inter', sans-serif" font-size="14" fill="#8899aa" text-anchor="middle" font-weight="600">standra.ai</text>
  </g>
</svg>
